extraction:
  spacy_model: "en_core_web_sm"
  entity_types:
    - "PERSON"
    - "ORG"
    - "GPE"
    - "LOC"
    - "EVENT"
    - "DATE"
    - "NORP"
  relation_confidence_threshold: 0.5
  use_deepke: true
  deepke:
    enabled: true
    command_template: "python ../../scripts/deepke_runner.py --input {input} --output {output}"
    conda_env: "deepke_py38"
    working_dir: "tools/deepke"
    output_dir: "data/exports/deepke"
    timeout_seconds: 600
    
temporal:
  engine: "heideltime"  # regex | heideltime
  heideltime:
    enabled: true
    jar_path: "tools/heideltime/HeidelTimeStandalone.jar"
    config_dir: "tools/heideltime/config"
    language: "en"
    document_type: "news"
  default_granularity: "day"
  unknown_date_strategy: "infer_from_context"

graph:
  neo4j_batch_size: 500
  node_label_article: "Article"
  node_label_entity: "Entity"
  node_label_event: "Event"

gdelt:
  base_url: "https://api.gdeltproject.org/api/v2/doc/doc"
  query: "China Romania"
  mode: "artlist"
  format: "json"
  max_records: 250          # GDELT max is 250 per request
  default_timespan: "1week" # used when no explicit date range is given
  default_credibility: 0.7  # GDELT articles are unscored; default before scorer runs
  request_timeout: 30
  rate_limit_delay: 1.0

credibility:
  default_score: 0.5
  known_reliable_domains:
    - "reuters.com"
    - "bbc.co.uk"
    - "bbc.com"
    - "apnews.com"
    - "ft.com"
    - "scmp.com"
    - "rfi.ro"
    - "g4media.ro"
