# ─────────────────────────────────────────────────────────────────────────────
# temporal_kg — central configuration
# All values can be overridden with environment variables.
# Convention: TEMPORAL_KG_<SECTION>_<KEY>  (upper-snake-case)
# ─────────────────────────────────────────────────────────────────────────────

project:
  name: "temporal_kg"
  version: "0.1.0"
  focus_countries: ["China", "Romania"]
  default_language: "en"

paths:
  data_raw: "data/raw"
  data_processed: "data/processed"
  data_exports: "data/exports"
  db: "db/temporal_kg.sqlite"
  logs: "logs"

logging:
  level: "INFO"
  format: "%(asctime)s | %(levelname)-8s | %(name)s | %(message)s"
  date_format: "%Y-%m-%d %H:%M:%S"
  log_to_file: true
  log_file: "logs/temporal_kg.log"
  max_bytes: 10485760
  backup_count: 5

database:
  sqlite_path: "db/temporal_kg.sqlite"
  neo4j_uri: "bolt://localhost:7687"
  neo4j_user: "neo4j"
  neo4j_password: ""

ingestion:
  translate_to_english: true
  translate_unknown_to_english: true
  translation_target_language: "en"
  require_translation_success: true
  user_agent: "temporal-kg-bot/0.1 (+research)"
  request_timeout: 10
  retry_attempts: 3
  retry_backoff: 2.0
  rate_limit_delay: 1.5
  save_raw_html: true              # persist raw HTML to data/raw/
  save_json: true                  # persist cleaned article JSON to data/processed/

